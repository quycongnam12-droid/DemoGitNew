<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="../assets/css/accountstyle.css">
</head>
<body>
  <div class="container">
    <form action="#" method="POST">
      <div class="input-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
          required
        />
        <span style="color: red; font-size: 12px" id="email-error"></span>
      </div>

      <div class="input-group">
        <label for="email">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          required
        />
        <span style="color: red; font-size: 12px" id="pass-error"></span>
      </div>

      <div class="input-group">
        <label for="password1">Confirm Password</label>
        <input
          type="password1"
          id="password1"
          name="password1"
          placeholder="Confirm your Password"
          required
        />
        <span style="color: red; font-size: 12px" id="pass1-error"></span>
      </div>

      <button type="submit" class="btn" id="register-btn">Register</button>
    </form>

    <div class="footer-text">
      Already have an account? <a href="../pages/login.html">Login</a>
    </div>
    <script type="module" src="../assets/js/firebase_config.js"></script>
    <script type="module" src="../assets/js/register.js"></script>
</body>
</html>
